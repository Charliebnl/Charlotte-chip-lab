site_name: CHIP — Charlie’s Padel Coach
site_description: Turn your matches into clear, actionable improvement
site_author: Charlotte

extra:
  homepage: https://Charliebnl.github.io/Charlotte-chip-lab/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

nav:
  - Home: index.md

  - CHIP:
      - Identity: 02-Agents/CHIP/IDENTITY.md
      - Soul: 02-Agents/CHIP/SOUL.md
      - Skills: 02-Agents/CHIP/SKILL.md
      - User: 02-Agents/CHIP/USER.md
      - Style: 02-Agents/CHIP/STYLE.md

  - Journal:
      - Week 4 Notes: 03-Journal/week4-notes.md

  - Showcase:
      - Best Results: 04-Showcase/best-results.md
