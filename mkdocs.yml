site_name: Charlotte's CHIP Lab
site_description: "Padel coaching agent and performance system"
site_author: "Charlotte"

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md

  - CHIP:
      - Identity: 02-Agents/CHIP/IDENTITY.md
      - Soul: 02-Agents/CHIP/SOUL.md
      - Skills: 02-Agents/CHIP/SKILL.md
      - User: 02-Agents/CHIP/USER.md
      - Style: 02-Agents/CHIP/STYLE.md

  - Journal:
      - Week 4 Notes: 03-Journal/week4-notes.md

  - Showcase:
      - Best Results: 04-Showcase/best-results.md
